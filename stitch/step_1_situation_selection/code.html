<div class="bg-primary/10 p-3 rounded-full text-primary">
<span class="material-symbols-outlined">edit_note</span>
</div>
<p class="text-slate-900 dark:text-slate-100 text-base font-bold leading-tight">Custom situation</p>
</div>

</div>
</div>

</div>
<div class="h-4 bg-white dark:bg-background-dark"></div>
