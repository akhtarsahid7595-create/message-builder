<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                        "accent-lavender": "#f3f0ff",
                        "accent-beige": "#fafaf9",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">

<nav class="flex items-center bg-white dark:bg-background-dark p-4 justify-between border-b border-slate-100 dark:border-slate-800">

</div>

</button>
</div>
</nav>

<main class="flex-1 flex flex-col items-center justify-center px-6 py-12 gap-8 text-center">

<div class="w-full max-w-sm aspect-square relative @container">
<div class="absolute inset-0 bg-gradient-to-tr from-accent-lavender to-accent-beige dark:from-primary/10 dark:to-primary/5 rounded-full blur-3xl opacity-60"></div>
<div class="relative w-full h-full flex items-center justify-center bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden" data-alt="Calming workspace with notebook and soft lighting" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA_F-eMHm0m-WgJlNDekF9BdL7DQOGg8SdnPH7FofvuerBhBiY4uF7GhGrW7Fd_7ygHLOW4lub0cyod2o2Ba7ltcOuoaDY7mqo7zfC6RlZd_ANhzEZhk8GzfiUWerrULCm7e8gi6z8g0mRZoPr0sE54iah9zYXnWeU1U1SCIAb4MbzuoNKbqyJ3ES3RaTa0wZQefKhypoqqNOAbv2tUVScwYkv01R9qjQW7-5sCIG0tOlU75eB6U9wFWisq46c89kurpe9BRe2dNNwv'); background-size: cover; background-position: center;">
<div class="absolute inset-0 bg-white/20 dark:bg-black/20 backdrop-blur-[2px]"></div>
<div class="bg-white/90 dark:bg-slate-900/90 p-6 rounded-2xl shadow-xl flex items-center gap-4 border border-white/50">
<span class="material-symbols-outlined text-primary text-4xl">edit_note</span>
<div class="text-left">
<div class="h-2 w-24 bg-primary/20 rounded-full mb-2"></div>
<div class="h-2 w-16 bg-primary/10 rounded-full"></div>
</div>
</div>
</div>
</div>
<!-- Typography Section -->
<div class="space-y-4 max-w-md">
<h1 class="text-slate-900 dark:text-slate-100 text-4xl font-bold tracking-tight">Message Builder</h1>
<p class="text-slate-600 dark:text-slate-400 text-lg leading-relaxed">
                Turn difficult emotions into clear and respectful messages.
            </p>
</div>
<!-- Action Buttons -->
<div class="w-full max-w-sm space-y-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-4 px-8 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
<span>Start Building Message</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<a class="inline-flex items-center gap-2 text-slate-500 hover:text-primary transition-colors py-2" href="#">
<span class="material-symbols-outlined text-lg">history</span>
<span class="font-medium">Message History</span>
</a>
</div>
</main>
<!-- Feature Highlights (Subtle) -->
<section class="px-6 pb-24 grid grid-cols-2 gap-4 max-w-md mx-auto">
<div class="p-4 bg-accent-lavender/50 dark:bg-slate-800 rounded-xl border border-white/50 dark:border-slate-700">
<span class="material-symbols-outlined text-primary mb-2 block">auto_awesome</span>
<p class="text-sm font-semibold text-slate-800 dark:text-slate-200">AI Assisted</p>
<p class="text-xs text-slate-500 dark:text-slate-400">Polished phrasing</p>
</div>
<div class="p-4 bg-accent-beige dark:bg-slate-800 rounded-xl border border-white/50 dark:border-slate-700">
<span class="material-symbols-outlined text-primary mb-2 block">security</span>
<p class="text-sm font-semibold text-slate-800 dark:text-slate-200">Private</p>
<p class="text-xs text-slate-500 dark:text-slate-400">Encrypted logs</p>
</div>
</section>

<div class="fixed bottom-0 left-0 right-0 bg-white dark:bg-background-dark border-t border-slate-100 dark:border-slate-800 safe-area-pb">

<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
</div>
<p class="text-xs font-medium leading-normal tracking-wide">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">edit_square</span>
</div>
<p class="text-xs font-medium leading-normal tracking-wide">Builder</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">history</span>
</div>
<p class="text-xs font-medium leading-normal tracking-wide">History</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">settings</span>
</div>
<p class="text-xs font-medium leading-normal tracking-wide">Settings</p>
</a>
</div>
</div>
